server:
  port: 8080

spring:
  application:
    name: authdemo
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/auth_demo?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 12345

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.demo.auth.model.entity
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: 1
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
jwt:
  secret: YOUR_BASE64_ENCODED_SECRET_KEY_THAT_IS_AT_LEAST_256_BITS_LONG_CHANGE_ME
  access-token-expiration: 86400000     # 24 hours in milliseconds
  refresh-token-expiration: 604800000   # 7 days in milliseconds

# 阿里云短信服务
aliyun:
  sms:
    access-key-id: YOUR_ALIYUN_ACCESS_KEY_ID
    access-key-secret: YOUR_ALIYUN_ACCESS_KEY_SECRET
    sign-name: 你的短信签名
    template-code: SMS_XXXXXXXX    # 验证码模板CODE
    expire-minutes: 5              # 验证码过期时间（分钟）
